<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Travel Now Logo E: Classic 8-point compass rose -->
  <!-- Travel-iconic, all focal elements within radius 420 of (512,512) for safe circle crop -->

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C76B"/>
      <stop offset="100%" stop-color="#A88533"/>
    </linearGradient>

    <!-- Cardinal long point template (apex at top, base at center) -->
    <g id="cardinal-point">
      <polygon points="0,-216 22,-26 0,-26" fill="#A88533"/>
      <polygon points="0,-216 -22,-26 0,-26" fill="url(#goldGrad)"/>
    </g>

    <!-- Intercardinal short point template (apex at NE direction from origin) -->
    <g id="intercardinal-point">
      <polygon points="0,-118 14,-18 0,-18" fill="#7A5F26"/>
      <polygon points="0,-118 -14,-18 0,-18" fill="#C9A84C"/>
    </g>
  </defs>

  <!-- Full-bleed navy background -->
  <rect width="1024" height="1024" fill="#172033"/>

  <!-- Decorative outer compass ring -->
  <circle cx="512" cy="420" r="260" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.32"/>
  <circle cx="512" cy="420" r="248" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>

  <!-- Tick marks every 30 degrees on the outer ring -->
  <g transform="translate(512, 420)" stroke="#C9A84C" stroke-width="2" opacity="0.5">
    <line x1="0" y1="-254" x2="0" y2="-238"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(30)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(60)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(90)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(120)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(150)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(180)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(210)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(240)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(270)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(300)"/>
    <line x1="0" y1="-254" x2="0" y2="-238" transform="rotate(330)"/>
  </g>

  <!-- Compass rose: 4 intercardinals first (behind), then 4 cardinals on top -->
  <g transform="translate(512, 420)">
    <!-- Intercardinal short points: NE / SE / SW / NW (45° offsets) -->
    <use href="#intercardinal-point" transform="rotate(45)"/>
    <use href="#intercardinal-point" transform="rotate(135)"/>
    <use href="#intercardinal-point" transform="rotate(225)"/>
    <use href="#intercardinal-point" transform="rotate(315)"/>

    <!-- Cardinal long points: N / E / S / W -->
    <use href="#cardinal-point"/>
    <use href="#cardinal-point" transform="rotate(90)"/>
    <use href="#cardinal-point" transform="rotate(180)"/>
    <use href="#cardinal-point" transform="rotate(270)"/>

    <!-- Centre pivot disk -->
    <circle cx="0" cy="0" r="28" fill="#172033" stroke="#C9A84C" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#C9A84C"/>

    <!-- White north-tip dot -->
    <circle cx="0" cy="-216" r="11" fill="#FFFFFF"/>
  </g>

  <!-- Cardinal letters NESW labelled outside the rose -->
  <g fill="#C9A84C" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="2">
    <text x="512" y="148" opacity="0.9">N</text>
    <text x="800" y="430" opacity="0.7">E</text>
    <text x="512" y="712" opacity="0.7">S</text>
    <text x="224" y="430" opacity="0.7">W</text>
  </g>

  <!-- Wordmark TRAVEL NOW -->
  <text x="512" y="808" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="900" font-size="64" fill="#FFFFFF"
        letter-spacing="11">
    TRAVEL NOW
  </text>

  <!-- Gold accent line -->
  <line x1="430" y1="840" x2="594" y2="840" stroke="#C9A84C" stroke-width="2"/>

  <!-- Tagline -->
  <text x="512" y="880" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="600" font-size="18" fill="#C9A84C"
        letter-spacing="7">
    SMARTER TRAVEL PREP
  </text>
</svg>
