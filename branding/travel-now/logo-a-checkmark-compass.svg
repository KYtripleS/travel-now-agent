<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Travel Now Logo A: Checkmark-Compass Hybrid -->
  <!-- Dual meaning: a checkmark AND a compass needle pointing NE -->

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#172033"/>

  <!-- Subtle compass ring -->
  <circle cx="512" cy="440" r="260" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"/>
  <circle cx="512" cy="440" r="250" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- Compass cardinal marks (N/E/S/W) - very subtle -->
  <g fill="#C9A84C" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle" opacity="0.5" letter-spacing="2">
    <text x="512" y="187">N</text>
    <text x="789" y="450">E</text>
    <text x="512" y="710">S</text>
    <text x="235" y="450">W</text>
  </g>

  <!-- Tick marks on compass ring -->
  <g stroke="#C9A84C" stroke-width="2" opacity="0.3">
    <line x1="512" y1="195" x2="512" y2="210"/>
    <line x1="757" y1="440" x2="772" y2="440"/>
    <line x1="512" y1="685" x2="512" y2="700"/>
    <line x1="252" y1="440" x2="267" y2="440"/>
  </g>

  <!-- Main mark: Checkmark / Needle hybrid -->
  <g transform="translate(512, 440)">
    <!-- Short stroke (lower-left to bottom of V) -->
    <path d="M -150 -10 L -30 110 L 200 -210"
          stroke="#C9A84C"
          stroke-width="52"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- North marker dot at the tip (white = north convention) -->
    <circle cx="200" cy="-210" r="16" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="852" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="900" font-size="96" fill="#FFFFFF"
        letter-spacing="20">
    TRAVEL NOW
  </text>

  <!-- Gold accent line -->
  <line x1="420" y1="888" x2="604" y2="888" stroke="#C9A84C" stroke-width="2"/>

  <!-- Tagline -->
  <text x="512" y="938" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="600" font-size="24" fill="#C9A84C"
        letter-spacing="10">
    SMARTER TRAVEL PREP
  </text>
</svg>
