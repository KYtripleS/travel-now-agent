<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Gently Yonder Open Graph card · 1200x630 · v1 (regeneratable from this SVG) -->

