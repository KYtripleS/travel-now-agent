<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#172033;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1421;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E5C76B;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1500" fill="url(#bgGrad)"/>

  <g opacity="0.18" fill="#C9A84C">
    <circle cx="120" cy="180" r="2"/>
    <circle cx="850" cy="220" r="3"/>
    <circle cx="200" cy="350" r="2"/>
    <circle cx="780" cy="420" r="2"/>
    <circle cx="100" cy="1280" r="2"/>
    <circle cx="900" cy="1320" r="3"/>
  </g>

  <text x="500" y="120" font-family="Georgia, serif" font-size="28" fill="#C9A84C" text-anchor="middle" letter-spacing="8">TRAVEL NOW</text>
  <line x1="430" y1="145" x2="570" y2="145" stroke="#C9A84C" stroke-width="2"/>

  <!-- Cream medallion -->
  <circle cx="500" cy="350" r="160" fill="#F8F4E9" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Smartphone outline (navy) with signal waves -->
  <g>
    <!-- Phone body -->
    <rect x="450" y="270" width="100" height="180" rx="14" ry="14" fill="#172033"/>
    <!-- Phone screen (cream tinted) -->
    <rect x="460" y="290" width="80" height="140" rx="3" ry="3" fill="#F8F4E9"/>
    <!-- "eSIM" text on screen -->
    <text x="500" y="370" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#172033" text-anchor="middle">eSIM</text>
    <!-- SIM contact pattern below text -->
    <rect x="475" y="385" width="22" height="6" rx="1" fill="#C9A84C"/>
    <rect x="502" y="385" width="22" height="6" rx="1" fill="#C9A84C"/>
    <rect x="475" y="395" width="22" height="6" rx="1" fill="#C9A84C"/>
    <rect x="502" y="395" width="22" height="6" rx="1" fill="#C9A84C"/>
    <rect x="475" y="405" width="22" height="6" rx="1" fill="#C9A84C"/>
    <rect x="502" y="405" width="22" height="6" rx="1" fill="#C9A84C"/>
    <!-- Phone home button -->
    <circle cx="500" cy="440" r="4" fill="#F8F4E9"/>
    <!-- Phone speaker slot -->
    <rect x="488" y="278" width="24" height="3" rx="1.5" fill="#F8F4E9"/>

    <!-- Signal waves above phone -->
    <path d="M 420 250 Q 500 215 580 250" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
    <path d="M 440 232 Q 500 205 560 232" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
    <path d="M 460 218 Q 500 198 540 218" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="500" cy="208" r="4" fill="#C9A84C"/>
  </g>

  <text x="500" y="650" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#F8F4E9" text-anchor="middle" letter-spacing="-2">eSIM SETUP</text>

  <text x="500" y="720" font-family="Georgia, serif" font-size="36" font-style="italic" fill="#C9A84C" text-anchor="middle">For international travel</text>

  <line x1="380" y1="780" x2="620" y2="780" stroke="url(#goldGrad)" stroke-width="3"/>

  <g font-family="Georgia, serif" font-size="38" fill="#F8F4E9">
    <polygon points="280,855 295,870 280,885 265,870" fill="url(#goldGrad)"/>
    <text x="320" y="880">What is eSIM</text>

    <polygon points="280,920 295,935 280,950 265,935" fill="url(#goldGrad)"/>
    <text x="320" y="945">Top providers compared</text>

    <polygon points="280,985 295,1000 280,1015 265,1000" fill="url(#goldGrad)"/>
    <text x="320" y="1010">Setup before you fly</text>

    <polygon points="280,1050 295,1065 280,1080 265,1065" fill="url(#goldGrad)"/>
    <text x="320" y="1075">Travel-day tips</text>
  </g>

  <line x1="380" y1="1150" x2="620" y2="1150" stroke="url(#goldGrad)" stroke-width="3"/>

  <rect x="250" y="1200" width="500" height="100" rx="50" fill="url(#goldGrad)"/>
  <text x="500" y="1262" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#172033" text-anchor="middle">Read the full guide →</text>

  <text x="500" y="1410" font-family="Georgia, serif" font-size="24" fill="#8a96aa" text-anchor="middle">travelnow • articles/esim</text>
</svg>
