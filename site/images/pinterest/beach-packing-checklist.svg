<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#172033;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1421;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E5C76B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F4E9;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FDE3A7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7EC0CE;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1500" fill="url(#bgGrad)"/>

  <g opacity="0.18" fill="#C9A84C">
    <circle cx="120" cy="180" r="2"/>
    <circle cx="850" cy="220" r="3"/>
    <circle cx="200" cy="350" r="2"/>
    <circle cx="780" cy="420" r="2"/>
    <circle cx="100" cy="1280" r="2"/>
    <circle cx="900" cy="1320" r="3"/>
  </g>

  <text x="500" y="120" font-family="Georgia, serif" font-size="28" fill="#C9A84C" text-anchor="middle" letter-spacing="8">TRAVEL NOW</text>
  <line x1="430" y1="145" x2="570" y2="145" stroke="#C9A84C" stroke-width="2"/>

  <!-- Beach medallion: sky-to-sea gradient -->
  <circle cx="500" cy="350" r="160" fill="url(#skyGrad)" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Sun -->
  <g>
    <circle cx="500" cy="290" r="48" fill="#FFD06B"/>
    <!-- Sun rays -->
    <g stroke="#FFD06B" stroke-width="5" stroke-linecap="round">
      <line x1="500" y1="218" x2="500" y2="238"/>
      <line x1="551" y1="239" x2="540" y2="252"/>
      <line x1="572" y1="290" x2="555" y2="290"/>
      <line x1="551" y1="341" x2="540" y2="328"/>
      <line x1="449" y1="341" x2="460" y2="328"/>
      <line x1="428" y1="290" x2="445" y2="290"/>
      <line x1="449" y1="239" x2="460" y2="252"/>
    </g>
  </g>

  <!-- Sea / waves at bottom of medallion -->
  <g fill="none" stroke="#3a8da8" stroke-width="5" stroke-linecap="round">
    <path d="M 360 410 Q 410 392 460 410 T 560 410 T 640 410"/>
    <path d="M 360 435 Q 410 417 460 435 T 560 435 T 640 435"/>
    <path d="M 360 460 Q 410 442 460 460 T 560 460 T 640 460"/>
  </g>

  <text x="500" y="650" font-family="Georgia, serif" font-size="110" font-weight="700" fill="#F8F4E9" text-anchor="middle" letter-spacing="-2">BEACH TRIP</text>

  <text x="500" y="720" font-family="Georgia, serif" font-size="36" font-style="italic" fill="#C9A84C" text-anchor="middle">Complete packing checklist</text>

  <line x1="380" y1="780" x2="620" y2="780" stroke="url(#goldGrad)" stroke-width="3"/>

  <g font-family="Georgia, serif" font-size="38" fill="#F8F4E9">
    <polygon points="280,855 295,870 280,885 265,870" fill="url(#goldGrad)"/>
    <text x="320" y="880">Sun &amp; reef protection</text>

    <polygon points="280,920 295,935 280,950 265,935" fill="url(#goldGrad)"/>
    <text x="320" y="945">Beach tech &amp; gear</text>

    <polygon points="280,985 295,1000 280,1015 265,1000" fill="url(#goldGrad)"/>
    <text x="320" y="1010">What to skip</text>

    <polygon points="280,1050 295,1065 280,1080 265,1065" fill="url(#goldGrad)"/>
    <text x="320" y="1075">Day-by-day checklist</text>
  </g>

  <line x1="380" y1="1150" x2="620" y2="1150" stroke="url(#goldGrad)" stroke-width="3"/>

  <rect x="250" y="1200" width="500" height="100" rx="50" fill="url(#goldGrad)"/>
  <text x="500" y="1262" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#172033" text-anchor="middle">Read the full guide →</text>

  <text x="500" y="1410" font-family="Georgia, serif" font-size="24" fill="#8a96aa" text-anchor="middle">travelnow • articles/beach-trip</text>
</svg>
