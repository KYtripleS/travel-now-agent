<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#172033;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1421;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E5C76B;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1500" fill="url(#bgGrad)"/>

  <!-- decorative dots -->
  <g opacity="0.18" fill="#C9A84C">
    <circle cx="120" cy="180" r="2"/>
    <circle cx="850" cy="220" r="3"/>
    <circle cx="200" cy="350" r="2"/>
    <circle cx="780" cy="420" r="2"/>
    <circle cx="100" cy="1280" r="2"/>
    <circle cx="900" cy="1320" r="3"/>
    <circle cx="150" cy="700" r="2"/>
    <circle cx="880" cy="900" r="2"/>
  </g>

  <!-- Header: GENTLY YONDER -->
  <text x="500" y="120" font-family="Georgia, serif" font-size="28" fill="#C9A84C" text-anchor="middle" letter-spacing="8">GENTLY YONDER</text>
  <line x1="430" y1="145" x2="570" y2="145" stroke="#C9A84C" stroke-width="2"/>

  <!-- Medallion: SIM card ringed by 12 gold diamonds (EU nod) -->
  <circle cx="500" cy="350" r="160" fill="#F8F4E9" stroke="url(#goldGrad)" stroke-width="6"/>
  <g fill="url(#goldGrad)">
    <polygon points="500,222 510,232 500,242 490,232"/>
    <polygon points="564,239 574,249 564,259 554,249"/>
    <polygon points="611,286 621,296 611,306 601,296"/>
    <polygon points="628,350 638,360 628,370 618,360"/>
    <polygon points="611,414 621,424 611,434 601,424"/>
    <polygon points="564,461 574,471 564,481 554,471"/>
    <polygon points="500,478 510,488 500,498 490,488"/>
    <polygon points="436,461 446,471 436,481 426,471"/>
    <polygon points="389,414 399,424 389,434 379,424"/>
    <polygon points="372,350 382,360 372,370 362,360"/>
    <polygon points="389,286 399,296 389,306 379,296"/>
    <polygon points="436,239 446,249 436,259 426,249"/>
  </g>
  <!-- SIM card body with notched corner -->
  <path d="M 448 292 L 532 292 L 560 320 L 560 408 L 448 408 Z" fill="#172033"/>
  <!-- gold contact chip -->
  <rect x="474" y="330" width="60" height="44" rx="8" fill="url(#goldGrad)"/>
  <line x1="494" y1="330" x2="494" y2="374" stroke="#172033" stroke-width="3"/>
  <line x1="514" y1="330" x2="514" y2="374" stroke="#172033" stroke-width="3"/>
  <line x1="474" y1="352" x2="534" y2="352" stroke="#172033" stroke-width="3"/>

  <!-- Massive title -->
  <text x="500" y="650" font-family="Georgia, serif" font-size="160" font-weight="700" fill="#F8F4E9" text-anchor="middle" letter-spacing="-2">EUROPE</text>

  <!-- Tagline -->
  <text x="500" y="720" font-family="Georgia, serif" font-size="36" font-style="italic" fill="#C9A84C" text-anchor="middle">Choosing your travel eSIM for 2026</text>

  <!-- Gold divider -->
  <line x1="380" y1="780" x2="620" y2="780" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Bullet list with gold diamond markers -->
  <g font-family="Georgia, serif" font-size="38" fill="#F8F4E9">
    <polygon points="280,855 295,870 280,885 265,870" fill="url(#goldGrad)"/>
    <text x="320" y="880">Regional plans, explained</text>

    <polygon points="280,920 295,935 280,950 265,935" fill="url(#goldGrad)"/>
    <text x="320" y="945">How much data to buy</text>

    <polygon points="280,985 295,1000 280,1015 265,1000" fill="url(#goldGrad)"/>
    <text x="320" y="1010">Airalo &amp; Saily in focus</text>

    <polygon points="280,1050 295,1065 280,1080 265,1065" fill="url(#goldGrad)"/>
    <text x="320" y="1075">Set up before you fly</text>
  </g>

  <!-- Bottom gold divider -->
  <line x1="380" y1="1150" x2="620" y2="1150" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- CTA pill button -->
  <rect x="250" y="1200" width="500" height="100" rx="50" fill="url(#goldGrad)"/>
  <text x="500" y="1262" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#172033" text-anchor="middle">Read the 2026 guide →</text>

  <!-- URL hint at bottom -->
  <text x="500" y="1410" font-family="Georgia, serif" font-size="24" fill="#8a96aa" text-anchor="middle">gentlyyonder • best-esim-europe-2026</text>
</svg>
